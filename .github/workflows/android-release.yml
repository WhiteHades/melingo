name: android-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode Android signing files
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: apps/learner_app/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks
          cat <<'EOF' > key.properties
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

      - name: Flutter pub get
        working-directory: apps/learner_app
        run: flutter pub get

      - name: Build Android app bundle
        working-directory: apps/learner_app
        run: flutter build appbundle --release

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: melangua-android-release
          path: apps/learner_app/build/app/outputs/bundle/release/app-release.aab
